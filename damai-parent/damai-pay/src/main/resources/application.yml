spring:
  application:
    name: damai-pay
  profiles:
    active: dev

server:
  port: 8084

# ShardingSphere 数据源配置（与 order 同分片组，共用 damai_order 库）
# 生产环境：4 库 × 8 表，按 user_id 取模路由（t_pay.user_id 为冗余分片键，保证与 t_order 同分片）
# 开发环境：单库简化配置
spring.datasource:
  driver-class-name: com.mysql.cj.jdbc.Driver
  url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/damai_order?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
  username: ${MYSQL_USER:root}
  password: ${MYSQL_PASSWORD:root}

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Redis
spring.data.redis:
  host: ${REDIS_HOST:127.0.0.1}
  port: ${REDIS_PORT:6379}
  password: ${REDIS_PASSWORD:}
  database: 0

# Kafka（pay 主要作为生产者：投递支付结果通知 order；consumer group 保留以便对账回执等扩展）
spring.kafka:
  bootstrap-servers: ${KAFKA_SERVERS:127.0.0.1:9092}
  producer:
    key-serializer: org.apache.kafka.common.serialization.StringSerializer
    value-serializer: org.apache.kafka.common.serialization.StringSerializer
  consumer:
    group-id: damai-pay
    auto-offset-reset: earliest
    enable-auto-commit: false

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.damai.pay: debug
